events { }

http {
    include    mime.types;
    server {
        listen 80;
        server_name localhost;

        location / {
            root /usr/share/nginx/html/app;
            index index.html;
        }

        location /odas-config/ {
            alias /usr/share/nginx/html/odas-config/;
        }

        location /assets/ {
            alias /usr/share/nginx/html/assets/;
        }

        # Keep icon source in assets while allowing existing app references.
        location = /odas-app-icon.svg {
            alias /usr/share/nginx/html/assets/odas-app-icon.svg;
        }

        location = /app/odas-app-icon.svg {
            alias /usr/share/nginx/html/assets/odas-app-icon.svg;
        }

        #add_header Access-Control-Allow-Origin *;
        #add_header Access-Control-Allow-Methods "GET, POST, OPTIONS";
    }
}
