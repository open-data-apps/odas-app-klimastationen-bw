<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7eb8f7"/>
      <stop offset="100%" style="stop-color:#3d3fa5"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Hintergrund -->
  <rect width="512" height="512" rx="108" ry="108" fill="url(#bg)"/>

  <!-- Thermometer -->
  <g filter="url(#shadow)">
    <!-- Röhre (Außen) -->
    <rect x="228" y="90" width="56" height="230" rx="28" fill="rgba(255,255,255,0.3)"/>
    <!-- Füllung rot -->
    <rect x="242" y="190" width="28" height="140" rx="14" fill="white"/>
    <!-- Kugel -->
    <circle cx="256" cy="368" r="46" fill="white"/>
    <!-- Skala-Striche -->
    <rect x="190" y="150" width="28" height="9" rx="4" fill="rgba(255,255,255,0.75)"/>
    <rect x="194" y="190" width="20" height="7" rx="3" fill="rgba(255,255,255,0.5)"/>
    <rect x="190" y="230" width="28" height="9" rx="4" fill="rgba(255,255,255,0.75)"/>
    <rect x="194" y="270" width="20" height="7" rx="3" fill="rgba(255,255,255,0.5)"/>
    <rect x="190" y="310" width="28" height="9" rx="4" fill="rgba(255,255,255,0.75)"/>
  </g>

  <!-- Sonne (oben rechts) -->
  <g fill="rgba(255,255,255,0.75)" filter="url(#shadow)">
    <circle cx="370" cy="138" r="26"/>
    <rect x="368" y="90" width="5" height="20" rx="2"/>
    <rect x="368" y="166" width="5" height="20" rx="2"/>
    <rect x="318" y="136" width="20" height="5" rx="2"/>
    <rect x="394" y="136" width="20" height="5" rx="2"/>
    <rect x="332" y="102" width="5" height="20" rx="2" transform="rotate(45 334.5 112)"/>
    <rect x="400" y="102" width="5" height="20" rx="2" transform="rotate(-45 402.5 112)"/>
    <rect x="332" y="160" width="5" height="20" rx="2" transform="rotate(-45 334.5 170)"/>
    <rect x="400" y="160" width="5" height="20" rx="2" transform="rotate(45 402.5 170)"/>
  </g>
</svg>
